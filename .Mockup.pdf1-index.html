// Paper texture
const PaperTexture = ({ opacity = 0.03 }) => (
  <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none" }}>
    <defs>
      <filter id="paper">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#paper)" opacity={opacity} />
  </svg>
);

// Italian arch
const Arch = ({ x, y, width, height, fill, opacity = 1 }) => (
  <g transform={`translate(${x},${y})`} opacity={opacity}>
    <rect x="0" y={height * 0.35} width={width} height={height * 0.65} fill={fill} />
    <ellipse cx={width / 2} cy={height * 0.35} rx={width / 2} ry={height * 0.35} fill={fill} />
  </g>
);
